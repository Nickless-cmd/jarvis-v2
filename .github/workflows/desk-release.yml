name: desk-release

# Bygger jarvis-desk (Electron-appen "Jarvis") til Linux + macOS når et
# release-tag pushes, og uploader artefakterne til GitHub-releasen for det tag.
# Windows bygges manuelt (se apps/jarvis-desk/WINDOWS-BUILD-NOTE.md) og uploades
# til samme tag. Builds er USIGNEREDE — Gatekeeper/SmartScreen advarer; forventet.

on:
  push:
    tags:
      - "jarvis-desktop-v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Eksisterende tag at bygge + uploade til (fx jarvis-desktop-v0.2.24)"
        required: true

permissions:
  contents: write

jobs:
  # Opretter releasen ÉN gang før build-matrixen, så de 3 parallelle platform-jobs
  # ikke racer om at CREATE'e samme tag (det gav "already_exists" → Linux-artefakter
  # tabt på 0.2.94). Bagefter UPLOADER build-jobs kun til den eksisterende release.
  prepare:
    runs-on: ubuntu-latest
    steps:
      - name: Ensure release exists
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          tag="${{ github.event.inputs.tag || github.ref_name }}"
          gh release view "$tag" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1 || \
            gh release create "$tag" --repo "$GITHUB_REPOSITORY" --title "$tag" \
              --notes "Automated desk release $tag"

  build:
    name: build-${{ matrix.platform }}
    needs: prepare
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux
          - os: macos-latest
            platform: mac
          - os: windows-latest
            platform: win
    defaults:
      run:
        working-directory: apps/jarvis-desk
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: apps/jarvis-desk/package-lock.json

      - name: Install deps
        run: npm ci

      - name: Build renderer + electron
        run: npm run build

      - name: Package (${{ matrix.platform }})
        run: npx electron-builder --${{ matrix.platform }} --publish never
        env:
          # Ingen Apple-signing/notarisering sat op — byg usigneret.
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - name: Upload til GitHub-release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.tag || github.ref_name }}
          fail_on_unmatched_files: false
          files: |
            apps/jarvis-desk/release/*.deb
            apps/jarvis-desk/release/*.AppImage
            apps/jarvis-desk/release/*.dmg
            apps/jarvis-desk/release/*.zip
            apps/jarvis-desk/release/*.exe
            apps/jarvis-desk/release/latest*.yml
            apps/jarvis-desk/release/*.blockmap
