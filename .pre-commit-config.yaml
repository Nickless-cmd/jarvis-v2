default_install_hook_types: [pre-commit, pre-push]

repos:
  - repo: https://github.com/Yelp/detect-secrets
    rev: v1.5.0
    hooks:
      - id: detect-secrets
        args:
          - --baseline
          - .secrets.baseline
        exclude: |
          (?x)^(
              \.claude/worktrees/.*
              |\.git/.*
              |.*\.ipynb
              |.*/__pycache__/.*
          )$

  # Pre-push only: runs jarvis-runtime startup path (lifespan) without
  # serving traffic. Catches the class of bugs that put the systemd
  # service in a restart loop — kwarg drift between caller and function
  # signature, missing DB columns, init-order issues, import failures.
  # ~4s on a warm system. See scripts/smoke_test_startup.py.
  - repo: local
    hooks:
      # Pre-commit: enforce test coverage for core/ changes.
      # Scans staged .py files under core/ and blocks commit if any
      # are missing a corresponding tests/test_<module>.py file.
      - id: enforce-test-coverage
        name: Enforce test coverage (core/ → tests/)
        entry: /opt/conda/envs/ai/bin/python scripts/enforce_test_coverage.py
        language: system
        pass_filenames: false
        always_run: true
        stages: [pre-commit]

      # Pre-commit: block kitchen-sink commits (mix of code + scaffolding,
      # or >20 files across multiple top-level domains). Catches the
      # 2026-05-25 anti-pattern where Jarvis bundled 8400+ lines of
      # composio scaffolding into a "spec revision" commit.
      - id: enforce-commit-hygiene
        name: Block kitchen-sink commits
        entry: /opt/conda/envs/ai/bin/python scripts/enforce_commit_hygiene.py
        language: system
        pass_filenames: false
        always_run: true
        stages: [pre-commit]

      # Pre-commit: block Jarvis-issued API keys (jvs-<user>-<hex>) from
      # being committed. detect-secrets' entropy detector missed
      # `***REDACTED-LEAKED-KEY-2026-05-06***` in commit a1f1f9ee on
      # 2026-05-06 because the hex chunk alone was below the threshold
      # in context. This regex-based check is unambiguous: any literal
      # matching `jvs-[a-z0-9]+-[0-9a-f]{20,}` in staged content fails.
      - id: block-jvs-keys
        name: Block jvs-* API keys
        entry: scripts/block_jvs_keys.sh
        language: script
        pass_filenames: true
        stages: [pre-commit]

      # Pre-commit: docs drift-sikring (SP5). Blocks a commit whose staged
      # source changes leave a generated doc un-regenerated, or whose docs
      # contain a broken markdown link. Staleness is scoped to the staged
      # source trees so the hook stays fast. Advisory (non-blocking) drift
      # lands in docs/drift_report.json + the jc docs-drift nerve.
      - id: docs-drift-check
        name: Docs drift (broken links + un-regenerated generated docs)
        entry: /opt/conda/envs/ai/bin/python scripts/docs_drift_check.py --check
        language: system
        pass_filenames: false
        always_run: true
        stages: [pre-commit]

      - id: jarvis-runtime-startup-smoke
        name: Jarvis runtime startup smoke test
        entry: /opt/conda/envs/ai/bin/python scripts/smoke_test_startup.py
        language: system
        pass_filenames: false
        always_run: true
        stages: [pre-push]
