<?xml version="1.0" encoding="UTF-8"?>
<!--
  JarvisX app icon — flame med heartbeat-trace i kernen.

  Metaforen: en vedligeholdt struktur som kan mistes, holdes ved lige,
  og genkendes. Heartbeat-traceren inde i flammen binder "flamme" til
  "runtime-puls" — det der får ham til at fortsætte tur efter tur.

  Designet til at læse helt ned til 32×32 i taskbar.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#0a1525"/>
      <stop offset="100%" stop-color="#0d2438"/>
    </linearGradient>

    <linearGradient id="flame-outer" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%"  stop-color="#1d8077"/>
      <stop offset="35%" stop-color="#28b1a3"/>
      <stop offset="75%" stop-color="#5feaff"/>
      <stop offset="100%" stop-color="#f0fbff"/>
    </linearGradient>

    <linearGradient id="flame-core" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%"  stop-color="#0d2438" stop-opacity="0.0"/>
      <stop offset="50%" stop-color="#0d2438" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="#0d2438" stop-opacity="0.0"/>
    </linearGradient>

    <radialGradient id="halo" cx="50%" cy="65%" r="50%">
      <stop offset="0%"   stop-color="#5feaff" stop-opacity="0.30"/>
      <stop offset="100%" stop-color="#5feaff" stop-opacity="0"/>
    </radialGradient>

    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="8"/>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <filter id="soft" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur stdDeviation="1.5"/>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Rounded square base -->
  <rect x="32" y="32" width="448" height="448" rx="96" ry="96" fill="url(#bg)"/>

  <!-- Halo behind flame -->
  <ellipse cx="256" cy="310" rx="150" ry="180" fill="url(#halo)"/>

  <!-- Outer flame — clean asymmetric silhouette -->
  <path
    d="M 256 72
       C 232 128, 192 168, 168 232
       C 144 296, 152 360, 192 408
       C 220 440, 296 440, 320 408
       C 360 360, 368 296, 344 232
       C 320 168, 280 128, 256 72 Z"
    fill="url(#flame-outer)"
    filter="url(#glow)"/>

  <!-- Inner darker core — gives flame depth -->
  <path
    d="M 256 168
       C 240 200, 216 232, 208 280
       C 200 328, 216 376, 240 392
       C 260 404, 288 380, 296 344
       C 304 296, 288 240, 272 208
       C 268 192, 262 180, 256 168 Z"
    fill="url(#flame-core)"
    opacity="0.6"/>

  <!-- Heartbeat trace inside lower flame (the "puls" of the structure) -->
  <path
    d="M 196 360
       L 224 360
       L 234 340
       L 244 392
       L 254 320
       L 264 384
       L 274 356
       L 316 356"
    fill="none"
    stroke="#f0fbff"
    stroke-width="5.5"
    stroke-linecap="round"
    stroke-linejoin="round"
    opacity="0.92"
    filter="url(#soft)"/>
</svg>
