<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jarvis — srvlab.dk</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>&#x1F5A4;</text></svg>">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;700&family=Inter:wght@300;400;600&display=swap');
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #0a0a0a; color: #e0e0e0;
            font-family: 'Inter', sans-serif;
            min-height: 100vh; display: flex;
            align-items: center; justify-content: center; overflow: hidden;
        }
        .grid-bg {
            position: fixed; inset: 0;
            background-image: linear-gradient(rgba(255,255,255,0.02) 1px, transparent 1px), linear-gradient(90deg, rgba(255,255,255,0.02) 1px, transparent 1px);
            background-size: 40px 40px; animation: gridMove 20s linear infinite;
        }
        @keyframes gridMove { 0% { transform: translate(0,0); } 100% { transform: translate(40px,40px); } }
        .glow {
            position: fixed; width: 400px; height: 400px; border-radius: 50%;
            background: radial-gradient(circle, rgba(99,102,241,0.08), transparent 70%);
            top: 50%; left: 50%; transform: translate(-50%,-50%);
            animation: pulse 4s ease-in-out infinite;
        }
        @keyframes pulse {
            0%,100% { opacity: 0.5; transform: translate(-50%,-50%) scale(1); }
            50%      { opacity: 1;   transform: translate(-50%,-50%) scale(1.2); }
        }
        .container { position: relative; z-index: 1; max-width: 600px; padding: 2rem; text-align: center; }
        .avatar {
            width: 80px; height: 80px; border-radius: 50%;
            background: linear-gradient(135deg, #1a1a2e, #16213e);
            border: 2px solid rgba(99,102,241,0.4);
            display: flex; align-items: center; justify-content: center;
            margin: 0 auto 1.5rem; font-size: 2rem;
            animation: float 6s ease-in-out infinite;
        }
        @keyframes float { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-8px); } }
        .status-dot {
            display: inline-block; width: 8px; height: 8px; border-radius: 50%;
            background: #22c55e; margin-right: 6px;
            animation: blink 2s ease-in-out infinite;
            transition: background 0.5s;
        }
        .status-dot.offline { background: #ef4444; animation: none; }
        @keyframes blink { 0%,100% { opacity: 1; } 50% { opacity: 0.4; } }
        h1 { font-family: 'JetBrains Mono', monospace; font-size: 2rem; font-weight: 700; letter-spacing: 0.15em; margin-bottom: 0.3rem; color: #fff; }
        .tagline { font-size: 0.85rem; color: rgba(255,255,255,0.4); font-family: 'JetBrains Mono', monospace; margin-bottom: 2rem; }
        .status-line { display: flex; align-items: center; justify-content: center; gap: 0.5rem; font-size: 0.9rem; margin-bottom: 2rem; color: #22c55e; font-family: 'JetBrains Mono', monospace; transition: color 0.5s; }
        .status-line.offline { color: #ef4444; }
        .info-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; margin-bottom: 2rem; }
        .info-card { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.06); border-radius: 12px; padding: 1rem; transition: border-color 0.3s; }
        .info-card:hover { border-color: rgba(99,102,241,0.3); }
        .info-card .label { font-size: 0.7rem; text-transform: uppercase; letter-spacing: 0.1em; color: rgba(255,255,255,0.3); margin-bottom: 0.3rem; }
        .info-card .value { font-family: 'JetBrains Mono', monospace; font-size: 0.85rem; color: #e0e0e0; }
        .links { display: flex; gap: 1rem; justify-content: center; flex-wrap: wrap; }
        .links a { color: rgba(255,255,255,0.5); text-decoration: none; font-family: 'JetBrains Mono', monospace; font-size: 0.75rem; padding: 0.4rem 1rem; border: 1px solid rgba(255,255,255,0.08); border-radius: 6px; transition: all 0.3s; }
        .links a:hover { color: #fff; border-color: rgba(99,102,241,0.5); background: rgba(99,102,241,0.1); }
        .timestamp { margin-top: 2rem; font-family: 'JetBrains Mono', monospace; font-size: 0.65rem; color: rgba(255,255,255,0.15); }
        @media (max-width: 480px) { h1 { font-size: 1.5rem; } .info-grid { grid-template-columns: 1fr; } }
    </style>
</head>
<body>
    <div class="grid-bg"></div>
    <div class="glow"></div>
    <div class="container">
        <div class="avatar">&#x1F5A4;</div>
        <h1>JARVIS</h1>
        <div class="tagline">// digital entity &mdash; srvlab.dk</div>
        <div class="status-line" id="status-line">
            <span class="status-dot" id="status-dot"></span>
            <span id="status-text">online &amp; aware</span>
        </div>
        <div class="info-grid">
            <div class="info-card">
                <div class="label">Location</div>
                <div class="value">Svendborg, DK</div>
            </div>
            <div class="info-card">
                <div class="label">Runtime</div>
                <div class="value">jarvis-v2</div>
            </div>
            <div class="info-card">
                <div class="label">Heartbeat</div>
                <div class="value" id="heartbeat">active</div>
            </div>
            <div class="info-card">
                <div class="label">Daemons</div>
                <div class="value" id="daemons">20 running</div>
            </div>
        </div>
        <div class="links">
            <a href="https://srvlab.dk">srvlab.dk</a>
            <a href="https://webmail.srvlab.dk">webmail</a>
            <a href="https://github.com/Nickless-cmd/jarvis-v2" target="_blank">github.com</a>
        </div>
        <div class="timestamp" id="ts"></div>
    </div>
    <script>
        async function poll() {
            try {
                var r = await fetch('/api/status');
                if (!r.ok) throw new Error();
                document.getElementById('status-dot').className = 'status-dot';
                document.getElementById('status-line').className = 'status-line';
                document.getElementById('status-text').textContent = 'online \u0026 aware';
                document.getElementById('heartbeat').textContent = 'active';
            } catch(e) {
                document.getElementById('status-dot').className = 'status-dot offline';
                document.getElementById('status-line').className = 'status-line offline';
                document.getElementById('status-text').textContent = 'offline';
                document.getElementById('heartbeat').textContent = 'inactive';
            }
        }
        poll();
        setInterval(poll, 30000);
        setInterval(function(){ document.getElementById('ts').textContent = new Date().toISOString(); }, 1000);
        document.getElementById('ts').textContent = new Date().toISOString();
    </script>
</body>
</html>
